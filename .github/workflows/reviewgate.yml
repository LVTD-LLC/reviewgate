name: ReviewGate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      summary_min_severity:
        description: Lowest severity shown in the canonical summary.
        required: false
        default: P4
      inline_min_severity:
        description: Lowest severity eligible for inline comments.
        required: false
        default: P2

concurrency:
  group: reviewgate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  reviewgate:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.actor != 'dependabot[bot]'
        )
      }}
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Check OpenRouter secret
        id: openrouter
        shell: bash
        run: |
          if [ -n "${OPENROUTER_API_KEY:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ReviewGate skipped: OPENROUTER_API_KEY secret is not configured."
          fi
      - name: Run ReviewGate
        if: steps.openrouter.outputs.configured == 'true'
        uses: ./
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          config: .reviewgate.yml
          target_score: "5"
          summary_min_severity: ${{ inputs.summary_min_severity || 'P4' }}
          inline_min_severity: ${{ inputs.inline_min_severity || 'P2' }}
