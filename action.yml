name: Shipcheck
description: Open-source AI pre-merge checks for agent-written PRs
author: LVTD

branding:
  icon: shield
  color: blue

inputs:
  openrouter_api_key:
    description: OpenRouter API key used for model-backed review stages.
    required: false
  config:
    description: Path to Shipcheck config.
    required: false
    default: .shipcheck.yml
  fail_under:
    description: Fail the check under this score.
    required: false
    default: "4"
  target_score:
    description: Score required for a fully passing review.
    required: false
    default: "5"
  report_only:
    description: Publish review results without failing the workflow when the gate fails. Use this when Shipcheck is advisory-only.
    required: false
    default: "false"
  gate_mode:
    description: Gate behavior for failed reviews. Use job to fail the workflow or report to publish only. The check mode is reserved for a future dedicated Check Run publisher.
    required: false
    default: job
  preset:
    description: OpenRouter model preset to use when model is not pinned. One of cheap, balanced, strong.
    required: false
    default: balanced
  model:
    description: Exact OpenRouter model id to use instead of the preset default.
    required: false
    default: ""
  mock_artifact:
    description: Optional local Shipcheck artifact path for dry-run or test workflows.
    required: false
    default: ""
  summary_min_severity:
    description: Lowest severity shown in the canonical summary. One of P0, P1, P2, P3, P4.
    required: false
    default: P4
  inline_min_severity:
    description: Lowest severity eligible for future inline comments. One of P0, P1, P2, P3, P4.
    required: false
    default: P2
  inline_min_confidence:
    description: Minimum model confidence required before posting an inline PR comment.
    required: false
    default: "0.80"
  publish_inline_comments:
    description: Post eligible line-specific findings as PR review comments.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Run Shipcheck
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        SHIPCHECK_CONFIG: ${{ inputs.config }}
        SHIPCHECK_FAIL_UNDER: ${{ inputs.fail_under }}
        SHIPCHECK_TARGET_SCORE: ${{ inputs.target_score }}
        SHIPCHECK_MOCK_ARTIFACT: ${{ inputs.mock_artifact }}
        SHIPCHECK_PRESET: ${{ inputs.preset }}
        SHIPCHECK_MODEL: ${{ inputs.model }}
        SHIPCHECK_GATE_MODE: ${{ inputs.gate_mode }}
        SHIPCHECK_SUMMARY_MIN_SEVERITY: ${{ inputs.summary_min_severity }}
        SHIPCHECK_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
      run: |
        set -euo pipefail
        args=(
          run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml"
          -p shipcheck-cli -- review-pr
          --repo "$GITHUB_WORKSPACE"
          --config "$SHIPCHECK_CONFIG"
          --json-out "$GITHUB_WORKSPACE/.shipcheck/review.json"
          --summary-out "$GITHUB_WORKSPACE/.shipcheck/summary.md"
          --target-score "$SHIPCHECK_TARGET_SCORE"
          --fail-under "$SHIPCHECK_FAIL_UNDER"
          --preset "$SHIPCHECK_PRESET"
          --gate-mode "$SHIPCHECK_GATE_MODE"
          --summary-min-severity "$SHIPCHECK_SUMMARY_MIN_SEVERITY"
          --inline-min-severity "$SHIPCHECK_INLINE_MIN_SEVERITY"
        )
        args+=(--report-only)
        if [ -n "$SHIPCHECK_MODEL" ]; then
          args+=(--model "$SHIPCHECK_MODEL")
        fi
        if [ -n "$SHIPCHECK_MOCK_ARTIFACT" ]; then
          args+=(--mock-artifact "$SHIPCHECK_MOCK_ARTIFACT")
        fi
        cargo "${args[@]}"

    - name: Publish Shipcheck summary
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        summary_path="$GITHUB_WORKSPACE/.shipcheck/summary.md"
        if [ -f "$summary_path" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$summary_path" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]; then
          echo "Shipcheck summary comment skipped: not a pull_request event."
          exit 0
        fi
        if [ ! -f "$summary_path" ]; then
          echo "Shipcheck summary comment skipped: missing $summary_path."
          exit 0
        fi
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "Shipcheck summary comment skipped: GH_TOKEN is empty."
          exit 0
        fi

        pr_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
        if [ -z "$pr_number" ]; then
          echo "Shipcheck summary comment skipped: no pull request number."
          exit 0
        fi

        marker='<!-- shipcheck-summary -->'
        legacy_marker='<!-- review-gate-summary -->'
        comment_ids="$(gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments" \
          --jq "map(.[]) | .[] | select(.body | contains(\"$marker\") or contains(\"$legacy_marker\")) | .id")"
        comment_id="$(gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments" \
          --jq "map(.[]) as \$comments | ([\$comments[] | select(.body | contains(\"$marker\") or contains(\"$legacy_marker\")) | {id, state: (try (.body | capture(\"<!-- (?:shipcheck|review-gate)-state (?<state>\\\\{.*\\\\}) -->\").state | fromjson) catch null)} | select(.state != null) | {id, run_count: (.state.run_count // 0), reviewed_count: ((.state.reviewed_shas // []) | length)}] | max_by([.run_count, .reviewed_count]).id) // ([\$comments[] | select(.body | contains(\"$marker\") or contains(\"$legacy_marker\")) | .id] | last) // empty")"
        previous_summary_path="$GITHUB_WORKSPACE/.shipcheck/previous-summary.md"

        if [ -n "$comment_id" ]; then
          gh api "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
            --jq .body > "$previous_summary_path"
          if ! cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
            -p shipcheck-cli -- render-summary \
            --input "$GITHUB_WORKSPACE/.shipcheck/review.json" \
            --previous-summary "$previous_summary_path" \
            --summary-out "$summary_path" \
            --summary-min-severity "${{ inputs.summary_min_severity }}" \
            --inline-min-severity "${{ inputs.inline_min_severity }}"; then
            echo "Previous Shipcheck summary state could not be reused; rendering without prior state." >&2
            cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
              -p shipcheck-cli -- render-summary \
              --input "$GITHUB_WORKSPACE/.shipcheck/review.json" \
              --summary-out "$summary_path" \
              --summary-min-severity "${{ inputs.summary_min_severity }}" \
              --inline-min-severity "${{ inputs.inline_min_severity }}"
          fi
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
            --field body=@"$summary_path" >/dev/null
          echo "Updated Shipcheck summary comment $comment_id."
          printf '%s\n' "$comment_ids" | sed '/^$/d' | while read -r duplicate_id; do
            if [ "$duplicate_id" != "$comment_id" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/issues/comments/$duplicate_id" >/dev/null
              echo "Deleted duplicate Shipcheck summary comment $duplicate_id."
            fi
          done
        else
          gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments" \
            --field body=@"$summary_path" >/dev/null
          echo "Created Shipcheck summary comment."
        fi

    - name: Publish Shipcheck inline comments
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        SHIPCHECK_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
        SHIPCHECK_INLINE_MIN_CONFIDENCE: ${{ inputs.inline_min_confidence }}
        SHIPCHECK_PUBLISH_INLINE_COMMENTS: ${{ inputs.publish_inline_comments }}
      run: |
        set -euo pipefail
        if [ "$SHIPCHECK_PUBLISH_INLINE_COMMENTS" != "true" ]; then
          echo "Shipcheck inline comments skipped: publish_inline_comments=false."
          exit 0
        fi
        if [ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]; then
          echo "Shipcheck inline comments skipped: not a pull_request event."
          exit 0
        fi
        artifact_path="$GITHUB_WORKSPACE/.shipcheck/review.json"
        if [ ! -f "$artifact_path" ]; then
          echo "Shipcheck inline comments skipped: missing $artifact_path."
          exit 0
        fi
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "Shipcheck inline comments skipped: GH_TOKEN is empty."
          exit 0
        fi

        pr_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
        commit_id="$(jq -r '.pull_request.head.sha // empty' "$GITHUB_EVENT_PATH")"
        if [ -z "$pr_number" ] || [ -z "$commit_id" ]; then
          echo "Shipcheck inline comments skipped: missing PR number or head SHA."
          exit 0
        fi

        existing_markers_path="$GITHUB_WORKSPACE/.shipcheck/existing-inline-markers.json"
        gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$pr_number/comments" \
          --jq '[.[].body | scan("<!-- (?:shipcheck|review-gate)-finding:.*? -->")]' > "$existing_markers_path"

        drafts_path="$GITHUB_WORKSPACE/.shipcheck/inline-comments.jsonl"
        jq -c \
          --arg floor "$SHIPCHECK_INLINE_MIN_SEVERITY" \
          --argjson min_confidence "$SHIPCHECK_INLINE_MIN_CONFIDENCE" \
          --slurpfile existing "$existing_markers_path" '
          def rank: {"P0":0,"P1":1,"P2":2,"P3":3,"P4":4};
          def marker($id): "<!-- shipcheck-finding:" + ($id | @uri) + " -->";
          def legacy_marker($id): "<!-- review-gate-finding:" + ($id | @uri) + " -->";
          .findings[]
          | select(.file != null and .line != null)
          | select((.confidence // 0) >= $min_confidence)
          | select((rank[.severity] // 99) <= (rank[$floor] // 2))
          | marker(.id) as $marker
          | legacy_marker(.id) as $legacy_marker
          | select(
              ((($existing | add) // []) | index($marker)) == null
              and (((($existing | add) // []) | index($legacy_marker)) == null)
            )
          | {
              path: .file,
              line: .line,
              side: "RIGHT",
              body: (
                $marker
                + "\n\n**" + .severity + ": " + .title + "**"
                + (if ((.detail // "") | length) > 0 then "\n\n" + .detail else "" end)
                + "\n\nAgent instruction: " + .agent_instruction
              )
            }
        ' "$artifact_path" > "$drafts_path"

        if [ ! -s "$drafts_path" ]; then
          echo "Shipcheck inline comments: no new eligible findings."
          exit 0
        fi

        posted=0
        failed=0
        while IFS= read -r draft; do
          body_path="$GITHUB_WORKSPACE/.shipcheck/inline-comment-body.json"
          jq -n --argjson draft "$draft" --arg commit_id "$commit_id" \
            '$draft + {commit_id: $commit_id}' > "$body_path"
          if gh api --method POST "repos/$GITHUB_REPOSITORY/pulls/$pr_number/comments" \
            --input "$body_path" >/dev/null; then
            posted=$((posted + 1))
          else
            failed=$((failed + 1))
            echo "Shipcheck inline comment could not be posted for $(jq -r '.path + \":\" + (.line|tostring)' "$body_path"). Keeping it in the summary." >&2
          fi
        done < "$drafts_path"
        echo "Shipcheck inline comments posted: $posted; skipped/failed: $failed."

    - name: Enforce Shipcheck
      shell: bash
      env:
        SHIPCHECK_REPORT_ONLY: ${{ inputs.report_only }}
        SHIPCHECK_GATE_MODE: ${{ inputs.gate_mode }}
      run: |
        set -euo pipefail
        if [ "$SHIPCHECK_REPORT_ONLY" = "true" ]; then
          echo "Shipcheck report-only mode enabled; not failing workflow."
          exit 0
        fi
        case "$SHIPCHECK_GATE_MODE" in
          report)
            echo "Shipcheck gate_mode=report; not failing workflow."
            exit 0
            ;;
          job)
            ;;
          check)
            echo "Shipcheck gate_mode=check is not implemented yet; use job or report." >&2
            exit 2
            ;;
          *)
            echo "Invalid Shipcheck gate_mode: $SHIPCHECK_GATE_MODE. Expected job, report, or check." >&2
            exit 2
            ;;
        esac
        status="$(jq -r '.status' "$GITHUB_WORKSPACE/.shipcheck/review.json")"
        score="$(jq -r '.score' "$GITHUB_WORKSPACE/.shipcheck/review.json")"
        fail_under="$(jq -r '.fail_under' "$GITHUB_WORKSPACE/.shipcheck/review.json")"
        if [ "$status" = "failed" ]; then
          echo "Shipcheck failed: score $score is below fail_under $fail_under."
          exit 1
        fi
        echo "Shipcheck status: $status ($score/5)."
