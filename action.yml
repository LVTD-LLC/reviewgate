name: ReviewGate
description: Open-source AI pre-merge checks for agent-written PRs
author: LVTD

branding:
  icon: shield
  color: blue

inputs:
  openrouter_api_key:
    description: OpenRouter API key used for model-backed review stages.
    required: false
  config:
    description: Path to ReviewGate config.
    required: false
    default: .reviewgate.yml
  fail_under:
    description: Fail the check under this score.
    required: false
    default: "4"
  target_score:
    description: Score required for a fully passing review.
    required: false
    default: "5"
  report_only:
    description: Publish review results without failing the workflow when the gate fails. Use this when ReviewGate is advisory-only.
    required: false
    default: "false"
  gate_mode:
    description: Gate behavior for failed reviews. Use job to fail the workflow, report to publish only, or check to publish a dedicated Check Run without failing the job.
    required: false
    default: job
  preset:
    description: OpenRouter model preset to use when model is not pinned. One of cheap, balanced, strong.
    required: false
    default: balanced
  model:
    description: Exact OpenRouter model id to use instead of the preset default.
    required: false
    default: ""
  mock_artifact:
    description: Optional local ReviewGate artifact path for dry-run or test workflows.
    required: false
    default: ""
  summary_min_severity:
    description: Lowest severity shown in the canonical summary. One of P0, P1, P2, P3, P4.
    required: false
    default: P4
  summary_style:
    description: Summary detail level. Use concise for the default PR UX or detailed for debugging and agent loops.
    required: false
    default: concise
  inline_min_severity:
    description: Lowest severity eligible for inline comments. One of P0, P1, P2, P3, P4.
    required: false
    default: P2
  inline_min_confidence:
    description: Minimum model confidence required before posting an inline PR comment.
    required: false
    default: "0.80"
  publish_inline_comments:
    description: Post eligible line-specific findings as PR review comments.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Publish ReviewGate start signal
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
          -p reviewgate-cli -- publish-start-signal \
          --repo "$GITHUB_WORKSPACE"

    - name: Run ReviewGate
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        REVIEWGATE_CONFIG: ${{ inputs.config }}
        REVIEWGATE_FAIL_UNDER: ${{ inputs.fail_under }}
        REVIEWGATE_TARGET_SCORE: ${{ inputs.target_score }}
        REVIEWGATE_MOCK_ARTIFACT: ${{ inputs.mock_artifact }}
        REVIEWGATE_PRESET: ${{ inputs.preset }}
        REVIEWGATE_MODEL: ${{ inputs.model }}
        REVIEWGATE_GATE_MODE: ${{ inputs.gate_mode }}
        REVIEWGATE_SUMMARY_MIN_SEVERITY: ${{ inputs.summary_min_severity }}
        REVIEWGATE_SUMMARY_STYLE: ${{ inputs.summary_style }}
        REVIEWGATE_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
        REVIEWGATE_INLINE_MIN_CONFIDENCE: ${{ inputs.inline_min_confidence }}
      run: |
        set -euo pipefail
        if [ -z "$REVIEWGATE_SUMMARY_STYLE" ]; then
          REVIEWGATE_SUMMARY_STYLE=concise
        fi
        args=(
          run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml"
          -p reviewgate-cli -- review-pr
          --repo "$GITHUB_WORKSPACE"
          --config "$REVIEWGATE_CONFIG"
          --json-out "$GITHUB_WORKSPACE/.reviewgate/review.json"
          --summary-out "$GITHUB_WORKSPACE/.reviewgate/summary.md"
          --target-score "$REVIEWGATE_TARGET_SCORE"
          --fail-under "$REVIEWGATE_FAIL_UNDER"
          --preset "$REVIEWGATE_PRESET"
          --gate-mode "$REVIEWGATE_GATE_MODE"
          --summary-min-severity "$REVIEWGATE_SUMMARY_MIN_SEVERITY"
          --summary-style "$REVIEWGATE_SUMMARY_STYLE"
          --inline-min-severity "$REVIEWGATE_INLINE_MIN_SEVERITY"
          --inline-min-confidence "$REVIEWGATE_INLINE_MIN_CONFIDENCE"
        )
        args+=(--report-only)
        if [ -n "$REVIEWGATE_MODEL" ]; then
          args+=(--model "$REVIEWGATE_MODEL")
        fi
        if [ -n "$REVIEWGATE_MOCK_ARTIFACT" ]; then
          args+=(--mock-artifact "$REVIEWGATE_MOCK_ARTIFACT")
        fi
        cargo "${args[@]}"

    - name: Publish ReviewGate inline comments
      id: inline-comments
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        REVIEWGATE_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
        REVIEWGATE_INLINE_MIN_CONFIDENCE: ${{ inputs.inline_min_confidence }}
        REVIEWGATE_PUBLISH_INLINE_COMMENTS: ${{ inputs.publish_inline_comments }}
      run: |
        set -euo pipefail
        args=(
          run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml"
          -p reviewgate-cli -- publish-inline-comments
          --repo "$GITHUB_WORKSPACE"
          --input "$GITHUB_WORKSPACE/.reviewgate/review.json"
          --inline-min-severity "$REVIEWGATE_INLINE_MIN_SEVERITY"
          --inline-min-confidence "$REVIEWGATE_INLINE_MIN_CONFIDENCE"
          --publish-inline-comments "$REVIEWGATE_PUBLISH_INLINE_COMMENTS"
        )
        if [ -n "${GITHUB_OUTPUT:-}" ]; then
          args+=(--github-output "$GITHUB_OUTPUT")
        fi
        cargo "${args[@]}"

    - name: Publish ReviewGate summary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REVIEWGATE_SUMMARY_MIN_SEVERITY: ${{ inputs.summary_min_severity }}
        REVIEWGATE_SUMMARY_STYLE: ${{ inputs.summary_style }}
        REVIEWGATE_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
        REVIEWGATE_INLINE_MIN_CONFIDENCE: ${{ inputs.inline_min_confidence }}
        REVIEWGATE_INLINE_COMMENTS_AVAILABLE: ${{ steps.inline-comments.outputs.inline_available || 'true' }}
      run: |
        set -euo pipefail
        if [ -z "$REVIEWGATE_SUMMARY_STYLE" ]; then
          REVIEWGATE_SUMMARY_STYLE=concise
        fi

        if ! cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
          -p reviewgate-cli -- publish-summary \
          --repo "$GITHUB_WORKSPACE" \
          --input "$GITHUB_WORKSPACE/.reviewgate/review.json" \
          --summary-out "$GITHUB_WORKSPACE/.reviewgate/summary.md" \
          --summary-min-severity "$REVIEWGATE_SUMMARY_MIN_SEVERITY" \
          --summary-style "$REVIEWGATE_SUMMARY_STYLE" \
          --inline-min-severity "$REVIEWGATE_INLINE_MIN_SEVERITY" \
          --inline-min-confidence "$REVIEWGATE_INLINE_MIN_CONFIDENCE" \
          --inline-comments-available "$REVIEWGATE_INLINE_COMMENTS_AVAILABLE"; then
          echo "::error title=ReviewGate summary publish failed::Could not publish the canonical ReviewGate summary comment. Check pull-request/issues permissions and the GitHub API error above." >&2
          exit 1
        fi

    - name: Publish ReviewGate check run
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REVIEWGATE_GATE_MODE: ${{ inputs.gate_mode }}
      run: |
        set -euo pipefail
        cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
          -p reviewgate-cli -- publish-check-run \
          --repo "$GITHUB_WORKSPACE" \
          --input "$GITHUB_WORKSPACE/.reviewgate/review.json" \
          --gate-mode "$REVIEWGATE_GATE_MODE"

    - name: Enforce ReviewGate
      if: ${{ always() }}
      shell: bash
      env:
        REVIEWGATE_REPORT_ONLY: ${{ inputs.report_only }}
        REVIEWGATE_GATE_MODE: ${{ inputs.gate_mode }}
      run: |
        set -euo pipefail
        cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
          -p reviewgate-cli -- enforce \
          --input "$GITHUB_WORKSPACE/.reviewgate/review.json" \
          --report-only "$REVIEWGATE_REPORT_ONLY" \
          --gate-mode "$REVIEWGATE_GATE_MODE"
