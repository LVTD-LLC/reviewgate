name: Shipcheck

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      summary_min_severity:
        description: Lowest severity shown in the canonical summary.
        required: false
        default: P4
      inline_min_severity:
        description: Lowest severity eligible for future inline comments.
        required: false
        default: P2

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  shipcheck:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Check OpenRouter secret
        id: openrouter
        shell: bash
        run: |
          if [ -n "${OPENROUTER_API_KEY:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Shipcheck skipped: OPENROUTER_API_KEY secret is not configured."
          fi
      - name: Run Shipcheck
        if: steps.openrouter.outputs.configured == 'true'
        uses: ./
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          config: .shipcheck.yml
          target_score: "5"
          fail_under: "4"
          summary_min_severity: ${{ inputs.summary_min_severity || 'P4' }}
          inline_min_severity: ${{ inputs.inline_min_severity || 'P2' }}
