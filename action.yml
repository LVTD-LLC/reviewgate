name: ReviewGate
description: Open-source AI pre-merge checks for agent-written PRs
author: LVTD

branding:
  icon: shield
  color: blue

inputs:
  openrouter_api_key:
    description: OpenRouter API key used for model-backed review stages.
    required: false
  config:
    description: Path to ReviewGate config.
    required: false
    default: .reviewgate.yml
  fail_under:
    description: Fail the check under this score.
    required: false
    default: "4"
  target_score:
    description: Score required for a fully passing review.
    required: false
    default: "5"
  report_only:
    description: Publish review results without failing the workflow when the gate fails. Use this when ReviewGate is advisory-only.
    required: false
    default: "false"
  gate_mode:
    description: Gate behavior for failed reviews. Use job to fail the workflow or report to publish only. The check mode is reserved for a future dedicated Check Run publisher.
    required: false
    default: job
  preset:
    description: OpenRouter model preset to use when model is not pinned. One of cheap, balanced, strong.
    required: false
    default: balanced
  model:
    description: Exact OpenRouter model id to use instead of the preset default.
    required: false
    default: ""
  mock_artifact:
    description: Optional local ReviewGate artifact path for dry-run or test workflows.
    required: false
    default: ""
  summary_min_severity:
    description: Lowest severity shown in the canonical summary. One of P0, P1, P2, P3, P4.
    required: false
    default: P4
  summary_style:
    description: Summary detail level. Use concise for the default PR UX or detailed for debugging and agent loops.
    required: false
    default: concise
  inline_min_severity:
    description: Lowest severity eligible for inline comments. One of P0, P1, P2, P3, P4.
    required: false
    default: P2
  inline_min_confidence:
    description: Minimum model confidence required before posting an inline PR comment.
    required: false
    default: "0.80"
  publish_inline_comments:
    description: Post eligible line-specific findings as PR review comments.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Publish ReviewGate start signal
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        if [ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]; then
          echo "ReviewGate start signal skipped: not a pull_request event."
          exit 0
        fi
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "ReviewGate start signal skipped: GH_TOKEN is empty."
          exit 0
        fi

        pr_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
        if [ -z "$pr_number" ]; then
          echo "ReviewGate start signal skipped: no pull request number."
          exit 0
        fi

        mkdir -p "$GITHUB_WORKSPACE/.reviewgate"
        marker='<!-- reviewgate-summary -->'
        comments_path="$GITHUB_WORKSPACE/.reviewgate/start-issue-comments.json"
        gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments" > "$comments_path"
        comment_id="$(jq -r --arg marker "$marker" '
          (add // []) as $comments
          | (
              [
                $comments[]
                | select(.body | contains($marker))
                | {
                    id,
                    state: (
                      try (
                        .body
                        | capture("<!-- reviewgate-state (?<state>\\{.*\\}) -->").state
                        | fromjson
                      ) catch null
                    )
                  }
                | select(.state != null)
                | {
                    id,
                    run_count: (.state.run_count // 0),
                    reviewed_count: ((.state.reviewed_shas // []) | length)
                  }
              ]
              | max_by([.run_count, .reviewed_count]).id
            )
            // (
              [$comments[] | select(.body | contains($marker)) | .id]
              | last
            )
            // empty
        ' "$comments_path")"

        body_path="$GITHUB_WORKSPACE/.reviewgate/start-summary.md"
        previous_summary_path="$GITHUB_WORKSPACE/.reviewgate/start-previous-summary.md"
        state_path="$GITHUB_WORKSPACE/.reviewgate/start-state.txt"
        : > "$state_path"
        if [ -n "$comment_id" ]; then
          gh api "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
            --jq .body > "$previous_summary_path"
          grep -m1 -o '<!-- reviewgate-state .* -->' "$previous_summary_path" > "$state_path" || true
        fi
        {
          printf '%s\n\n' "$marker"
          if [ -s "$state_path" ]; then
            cat "$state_path"
            printf '\n\n'
          fi
          cat <<'EOF'
# ReviewGate: running

ReviewGate is reviewing this PR. The final score, concise summary, and inline comments will replace this message when the run completes.
EOF
        } > "$body_path"

        if [ -n "$comment_id" ]; then
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
            --field body=@"$body_path" >/dev/null
          echo "Updated ReviewGate start signal comment $comment_id."
        else
          gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments" \
            --field body=@"$body_path" >/dev/null
          echo "Created ReviewGate start signal comment."
        fi

    - name: Run ReviewGate
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        REVIEWGATE_CONFIG: ${{ inputs.config }}
        REVIEWGATE_FAIL_UNDER: ${{ inputs.fail_under }}
        REVIEWGATE_TARGET_SCORE: ${{ inputs.target_score }}
        REVIEWGATE_MOCK_ARTIFACT: ${{ inputs.mock_artifact }}
        REVIEWGATE_PRESET: ${{ inputs.preset }}
        REVIEWGATE_MODEL: ${{ inputs.model }}
        REVIEWGATE_GATE_MODE: ${{ inputs.gate_mode }}
        REVIEWGATE_SUMMARY_MIN_SEVERITY: ${{ inputs.summary_min_severity }}
        REVIEWGATE_SUMMARY_STYLE: ${{ inputs.summary_style }}
        REVIEWGATE_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
        REVIEWGATE_INLINE_MIN_CONFIDENCE: ${{ inputs.inline_min_confidence }}
      run: |
        set -euo pipefail
        args=(
          run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml"
          -p reviewgate-cli -- review-pr
          --repo "$GITHUB_WORKSPACE"
          --config "$REVIEWGATE_CONFIG"
          --json-out "$GITHUB_WORKSPACE/.reviewgate/review.json"
          --summary-out "$GITHUB_WORKSPACE/.reviewgate/summary.md"
          --target-score "$REVIEWGATE_TARGET_SCORE"
          --fail-under "$REVIEWGATE_FAIL_UNDER"
          --preset "$REVIEWGATE_PRESET"
          --gate-mode "$REVIEWGATE_GATE_MODE"
          --summary-min-severity "$REVIEWGATE_SUMMARY_MIN_SEVERITY"
          --summary-style "$REVIEWGATE_SUMMARY_STYLE"
          --inline-min-severity "$REVIEWGATE_INLINE_MIN_SEVERITY"
          --inline-min-confidence "$REVIEWGATE_INLINE_MIN_CONFIDENCE"
        )
        args+=(--report-only)
        if [ -n "$REVIEWGATE_MODEL" ]; then
          args+=(--model "$REVIEWGATE_MODEL")
        fi
        if [ -n "$REVIEWGATE_MOCK_ARTIFACT" ]; then
          args+=(--mock-artifact "$REVIEWGATE_MOCK_ARTIFACT")
        fi
        cargo "${args[@]}"

    - name: Publish ReviewGate summary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REVIEWGATE_SUMMARY_MIN_SEVERITY: ${{ inputs.summary_min_severity }}
        REVIEWGATE_SUMMARY_STYLE: ${{ inputs.summary_style }}
        REVIEWGATE_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
        REVIEWGATE_INLINE_MIN_CONFIDENCE: ${{ inputs.inline_min_confidence }}
      run: |
        set -euo pipefail
        on_summary_publish_error() {
          status=$?
          echo "::error title=ReviewGate summary publish failed::Could not publish the canonical ReviewGate summary comment. Check pull-request/issues permissions and the GitHub API error above." >&2
          exit "$status"
        }
        trap on_summary_publish_error ERR

        summary_path="$GITHUB_WORKSPACE/.reviewgate/summary.md"
        if [ -f "$summary_path" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$summary_path" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]; then
          echo "ReviewGate summary comment skipped: not a pull_request event."
          exit 0
        fi
        if [ ! -f "$summary_path" ]; then
          echo "ReviewGate summary comment skipped: missing $summary_path."
          exit 0
        fi
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "ReviewGate summary comment skipped: GH_TOKEN is empty."
          exit 0
        fi

        pr_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
        if [ -z "$pr_number" ]; then
          echo "ReviewGate summary comment skipped: no pull request number."
          exit 0
        fi

        marker='<!-- reviewgate-summary -->'
        comments_path="$GITHUB_WORKSPACE/.reviewgate/issue-comments.json"
        gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments" > "$comments_path"
        comment_ids="$(jq -r --arg marker "$marker" \
          'add // [] | .[] | select(.body | contains($marker)) | .id' "$comments_path")"
        comment_id="$(jq -r --arg marker "$marker" '
          (add // []) as $comments
          | (
              [
                $comments[]
                | select(.body | contains($marker))
                | {
                    id,
                    state: (
                      try (
                        .body
                        | capture("<!-- reviewgate-state (?<state>\\{.*\\}) -->").state
                        | fromjson
                      ) catch null
                    )
                  }
                | select(.state != null)
                | {
                    id,
                    run_count: (.state.run_count // 0),
                    reviewed_count: ((.state.reviewed_shas // []) | length)
                  }
              ]
              | max_by([.run_count, .reviewed_count]).id
            )
            // (
              [$comments[] | select(.body | contains($marker)) | .id]
              | last
            )
            // empty
        ' "$comments_path")"
        previous_summary_path="$GITHUB_WORKSPACE/.reviewgate/previous-summary.md"

        if [ -n "$comment_id" ]; then
          gh api "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
            --jq .body > "$previous_summary_path"
          if ! cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
            -p reviewgate-cli -- render-summary \
            --input "$GITHUB_WORKSPACE/.reviewgate/review.json" \
            --previous-summary "$previous_summary_path" \
            --summary-out "$summary_path" \
            --summary-min-severity "$REVIEWGATE_SUMMARY_MIN_SEVERITY" \
            --summary-style "$REVIEWGATE_SUMMARY_STYLE" \
            --inline-min-severity "$REVIEWGATE_INLINE_MIN_SEVERITY" \
            --inline-min-confidence "$REVIEWGATE_INLINE_MIN_CONFIDENCE"; then
            echo "Previous ReviewGate summary state could not be reused; rendering without prior state." >&2
            cargo run --locked --manifest-path "$GITHUB_ACTION_PATH/Cargo.toml" \
              -p reviewgate-cli -- render-summary \
              --input "$GITHUB_WORKSPACE/.reviewgate/review.json" \
              --summary-out "$summary_path" \
              --summary-min-severity "$REVIEWGATE_SUMMARY_MIN_SEVERITY" \
              --summary-style "$REVIEWGATE_SUMMARY_STYLE" \
              --inline-min-severity "$REVIEWGATE_INLINE_MIN_SEVERITY" \
              --inline-min-confidence "$REVIEWGATE_INLINE_MIN_CONFIDENCE"
          fi
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
            --field body=@"$summary_path" >/dev/null
          echo "Updated ReviewGate summary comment $comment_id."
          printf '%s\n' "$comment_ids" | sed '/^$/d' | while read -r duplicate_id; do
            if [ "$duplicate_id" != "$comment_id" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/issues/comments/$duplicate_id" >/dev/null
              echo "Deleted duplicate ReviewGate summary comment $duplicate_id."
            fi
          done
        else
          gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments" \
            --field body=@"$summary_path" >/dev/null
          echo "Created ReviewGate summary comment."
        fi

    - name: Publish ReviewGate inline comments
      shell: bash
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        REVIEWGATE_INLINE_MIN_SEVERITY: ${{ inputs.inline_min_severity }}
        REVIEWGATE_INLINE_MIN_CONFIDENCE: ${{ inputs.inline_min_confidence }}
        REVIEWGATE_PUBLISH_INLINE_COMMENTS: ${{ inputs.publish_inline_comments }}
      run: |
        set -euo pipefail
        if [ "$REVIEWGATE_PUBLISH_INLINE_COMMENTS" != "true" ]; then
          echo "ReviewGate inline comments skipped: publish_inline_comments=false."
          exit 0
        fi
        if [ "${GITHUB_EVENT_NAME:-}" != "pull_request" ]; then
          echo "ReviewGate inline comments skipped: not a pull_request event."
          exit 0
        fi
        artifact_path="$GITHUB_WORKSPACE/.reviewgate/review.json"
        if [ ! -f "$artifact_path" ]; then
          echo "ReviewGate inline comments skipped: missing $artifact_path."
          exit 0
        fi
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "ReviewGate inline comments skipped: GH_TOKEN is empty."
          exit 0
        fi

        pr_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
        commit_id="$(jq -r '.pull_request.head.sha // empty' "$GITHUB_EVENT_PATH")"
        if [ -z "$pr_number" ] || [ -z "$commit_id" ]; then
          echo "ReviewGate inline comments skipped: missing PR number or head SHA."
          exit 0
        fi

        existing_markers_path="$GITHUB_WORKSPACE/.reviewgate/existing-inline-markers.json"
        gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/pulls/$pr_number/comments" \
          | jq '[.[][]? | .body | scan("<!-- reviewgate-finding:.*? -->")]' > "$existing_markers_path"

        drafts_path="$GITHUB_WORKSPACE/.reviewgate/inline-comments.jsonl"
        jq -c \
          --arg floor "$REVIEWGATE_INLINE_MIN_SEVERITY" \
          --argjson min_confidence "$REVIEWGATE_INLINE_MIN_CONFIDENCE" \
          --slurpfile existing "$existing_markers_path" '
          def rank: {"P0":0,"P1":1,"P2":2,"P3":3,"P4":4};
          def marker($id): "<!-- reviewgate-finding:" + ($id | @uri) + " -->";
          .findings[]
          | select(.file != null and .line != null)
          | select((.confidence // 0) >= $min_confidence)
          | select((rank[.severity] // 99) <= (rank[$floor] // 2))
          | marker(.id) as $marker
          | select(
              ((($existing | add) // []) | index($marker)) == null
            )
          | {
              path: .file,
              line: .line,
              side: "RIGHT",
              body: (
                $marker
                + "\n\n**" + .severity + ": " + .title + "**"
                + (if ((.detail // "") | length) > 0 then "\n\n" + .detail else "" end)
                + "\n\nAgent instruction: " + .agent_instruction
              )
            }
        ' "$artifact_path" > "$drafts_path"

        if [ ! -s "$drafts_path" ]; then
          echo "ReviewGate inline comments: no new eligible findings."
          exit 0
        fi

        posted=0
        failed=0
        while IFS= read -r draft; do
          body_path="$GITHUB_WORKSPACE/.reviewgate/inline-comment-body.json"
          jq -n --argjson draft "$draft" --arg commit_id "$commit_id" \
            '$draft + {commit_id: $commit_id}' > "$body_path"
          if gh api --method POST "repos/$GITHUB_REPOSITORY/pulls/$pr_number/comments" \
            --input "$body_path" >/dev/null; then
            posted=$((posted + 1))
          else
            failed=$((failed + 1))
            echo "ReviewGate inline comment could not be posted for $(jq -r '.path + \":\" + (.line|tostring)' "$body_path"). Inspect the JSON artifact or rerun with summary_style=detailed for full finding detail." >&2
          fi
        done < "$drafts_path"
        echo "ReviewGate inline comments posted: $posted; skipped/failed: $failed."
        if [ "$failed" -gt 0 ]; then
          echo "::warning title=ReviewGate inline comments::Failed to publish $failed inline comment(s). The review JSON still contains the full findings."
        fi

    - name: Enforce ReviewGate
      shell: bash
      env:
        REVIEWGATE_REPORT_ONLY: ${{ inputs.report_only }}
        REVIEWGATE_GATE_MODE: ${{ inputs.gate_mode }}
      run: |
        set -euo pipefail
        if [ "$REVIEWGATE_REPORT_ONLY" = "true" ]; then
          echo "ReviewGate report-only mode enabled; not failing workflow."
          exit 0
        fi
        case "$REVIEWGATE_GATE_MODE" in
          report)
            echo "ReviewGate gate_mode=report; not failing workflow."
            exit 0
            ;;
          job)
            ;;
          check)
            echo "ReviewGate gate_mode=check is not implemented yet; use job or report." >&2
            exit 2
            ;;
          *)
            echo "Invalid ReviewGate gate_mode: $REVIEWGATE_GATE_MODE. Expected job, report, or check." >&2
            exit 2
            ;;
        esac
        status="$(jq -r '.status' "$GITHUB_WORKSPACE/.reviewgate/review.json")"
        score="$(jq -r '.score' "$GITHUB_WORKSPACE/.reviewgate/review.json")"
        fail_under="$(jq -r '.fail_under' "$GITHUB_WORKSPACE/.reviewgate/review.json")"
        if [ "$status" = "failed" ]; then
          echo "ReviewGate failed: score $score is below fail_under $fail_under."
          exit 1
        fi
        echo "ReviewGate status: $status ($score/5)."
